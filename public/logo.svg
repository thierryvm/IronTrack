<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Icon: orange rounded square with white dumbbell -->
  <rect x="0" y="0" width="60" height="60" rx="14" fill="#f97316"/>
  <!-- Dumbbell paths (from Logo component) scaled to 40x40 centered in 60x60 -->
  <!-- Barbell center bar -->
  <line x1="16" y1="30" x2="44" y2="30" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Left vertical bar -->
  <line x1="18" y1="14" x2="18" y2="46" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Right vertical bar -->
  <line x1="42" y1="14" x2="42" y2="46" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Left plates top -->
  <line x1="10" y1="20" x2="26" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Left plates bottom -->
  <line x1="10" y1="40" x2="26" y2="40" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Right plates top -->
  <line x1="34" y1="20" x2="50" y2="20" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Right plates bottom -->
  <line x1="34" y1="40" x2="50" y2="40" stroke="white" stroke-width="4" stroke-linecap="round"/>

  <!-- Text: Iron (dark) + Track (orange) -->
  <text x="74" y="26" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="20" fill="#111218">Iron</text>
  <text x="112" y="26" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="20" fill="#f97316">Track</text>

  <!-- Tagline -->
  <text x="74" y="46" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="11" fill="#6b7280" letter-spacing="0.05em">PERFORMANCE TRACKING</text>
</svg>
