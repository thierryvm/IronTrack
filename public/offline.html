<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors-ligne – IronTrack</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff9800 0%, #e91e63 100%);
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .mascot {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: pop 1.2s infinite alternate;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      100% { transform: scale(1.08) rotate(-2deg); }
    }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .btn {
      background: #fff;
      color: #e91e63;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 2rem;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s, color 0.2s;
    }
    .btn:hover {
      background: #e91e63;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="mascot">💪</div>
  <h1 id="offline-title">Tu es hors-ligne&nbsp;!</h1>
  <p>
    Pas de panique, IronBuddy veille au grain.<br>
    Même sans réseau, tu restes stylé et motivé.<br>
    <strong>Reconnecte-toi pour synchroniser tes progrès&nbsp;!</strong>
  </p>
  <button class="btn" onclick="window.location.reload()">Réessayer</button>
  
  <script>
    // Personnalisation du message avec le nom de l'utilisateur
    function personalizeOfflinePage() {
      try {
        // Essayer de récupérer le nom depuis localStorage ou sessionStorage
        const userName = localStorage.getItem('userName') || 
                        localStorage.getItem('user_name') ||
                        sessionStorage.getItem('userName') ||
                        sessionStorage.getItem('user_name') ||
                        'Champion(ne)';
        
        const title = document.getElementById('offline-title');
        if (userName && userName !== 'null' && userName !== 'undefined') {
          title.textContent = `${userName}, tu es hors-ligne !`;
        } else {
          title.textContent = 'Champion(ne), tu es hors-ligne !';
        }
      } catch (error) {
        // Fallback en cas d'erreur
        console.log('Erreur lors de la personnalisation:', error);
        document.getElementById('offline-title').textContent = 'Champion(ne), tu es hors-ligne !';
      }
    }
    
    // Exécuter la personnalisation au chargement
    personalizeOfflinePage();
  </script>
  <p style="margin-top:2rem;font-size:0.95rem;opacity:0.7;">IronTrack PWA &copy; 2024 – Toujours là, même hors-ligne !</p>
</body>
</html>
