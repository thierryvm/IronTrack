  <rect x="54" y="182" width="148" height="24" rx="3" fill="#F5F1EA"/>
  <!-- Acid-lime PR signature dot, upper right -->
  <circle cx="218" cy="58" r="12" fill="#D4FF3A"/>
</svg>
