<!DOCTYPE html>
<html>
<head>
  <title>Debug Menu Mobile</title>
  <style>
    .menu-debug {
      position: fixed;
      top: 0;
      left: 0;
      width: 320px;
      height: 100vh;
      background: white;
      z-index: 50;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      border-right: 1px solid #e5e7eb;
    }
    .menu-header {
      background: linear-gradient(to right, #ea580c, #f97316, #fb923c);
      color: white;
      padding: 16px;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 40;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="menu-debug">
    <div class="menu-header">
      <strong>IronTrack</strong> - Test Menu
    </div>
    <div style="padding: 16px;">
      <h3>Navigation</h3>
      <div style="margin: 8px 0; padding: 12px; background: #f3f4f6; border-radius: 8px;">
        📅 Calendrier
      </div>
      <div style="margin: 8px 0; padding: 12px; background: #f3f4f6; border-radius: 8px;">
        💪 Exercices  
      </div>
      <div style="margin: 8px 0; padding: 12px; background: #f3f4f6; border-radius: 8px;">
        🏋️ Séances
      </div>
    </div>
  </div>
</body>
</html>
