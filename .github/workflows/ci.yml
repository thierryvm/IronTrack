name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: '1'
      # Valeurs factices — le build statique n'appelle pas réellement Supabase
      NEXT_PUBLIC_SUPABASE_URL: 'https://ci.supabase.co'
      NEXT_PUBLIC_SUPABASE_ANON_KEY: 'ci-anon-key'
      NEXT_PUBLIC_SITE_URL: 'https://iron-track-dusky.vercel.app'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm audit --audit-level=high --production || true
        # Non bloquant pour l'instant, mais visible dans les checks PR
